{% extends "base.html" %}

{% block content %}

<div class="container">

<h1>Shop</h1>

<div class="row">

{% for product in products %}

<div class="col-md-4">

<div class="card mb-4">

{% if product.image %}
<img src="{{ product.image.url }}" class="card-img-top">
{% endif %}

<div class="card-body">

<h5>{{ product.name }}</h5>

<p>€{{ product.price }}</p>

<a href="{% url 'product_detail' product.id %}" class="btn btn-primary">
View
</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}

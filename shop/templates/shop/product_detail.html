{% extends "base.html" %}

{% block content %}

<div class="container">

<h1>{{ product.name }}</h1>

{% if product.image %}
<img src="{{ product.image.url }}" class="img-fluid">
{% endif %}

<p>{{ product.description }}</p>

<h3>€{{ product.price }}</h3>

<a href="{% url 'add_to_cart' product.id %}" class="btn btn-success">
    Add to Cart
    </a>

</div>

{% endblock %}

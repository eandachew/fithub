{% extends "base.html" %}

{% block content %}

<div class="container">

<h1>{{ product.name }}</h1>

{% if product.image %}
<img src="{{ product.image.url }}" class="img-fluid">
{% endif %}

<p>{{ product.description }}</p>

<h3>€{{ product.price }}</h3>

<button class="btn btn-success">Buy Now</button>

</div>

{% endblock %}
